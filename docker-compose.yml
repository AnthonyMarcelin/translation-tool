services:
  front:
    build: ./front
    container_name: translation-front
    restart: always
    networks:
      - traefik_public
      - internal
    labels:
      - "traefik.enable=true"

      # === ACCÈS PUBLIC (OVH) ===
      - "traefik.http.routers.translation.rule=Host(`translate.drannocserver.com`)"
      - "traefik.http.routers.translation.entrypoints=websecure"
      - "traefik.http.routers.translation.tls=true"
      - "traefik.http.routers.translation.tls.certresolver=letsencrypt"
      - "traefik.http.services.translation.loadbalancer.server.port=80"

  back:
    build: ./back
    container_name: translation-back
    restart: always
    networks:
      - traefik_public
      - internal
    volumes:
      - translation_db:/app/data
    environment:
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      # Routage API interne via Traefik (non exposée directement)
      - "traefik.http.routers.translation-back.rule=Host(`translate.drannocserver.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.translation-back.entrypoints=websecure"
      - "traefik.http.routers.translation-back.tls.certresolver=letsencrypt"
      - "traefik.http.routers.translation-back.service=translation-back-service"
      - "traefik.http.services.translation-back-service.loadbalancer.server.port=3001"
      - "traefik.http.routers.translation-back.middlewares=translation-back-strip"
      - "traefik.http.middlewares.translation-back-strip.stripprefix.prefixes=/api"

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    restart: always
    networks:
      - internal
    volumes:
      - libretranslate_models:/data
      - libretranslate_cache:/app/cache
    environment:
      - LT_LOAD_ONLY=en,fr,es,de,it,nl,pt,ja
      - LT_UPDATE_MODELS=true

volumes:
  translation_db:
    name: translation-tool-database
  libretranslate_models:
    name: translation-tool-lt-models
  libretranslate_cache:
    name: translation-tool-lt-cache

networks:
  traefik_public:
    external: true
  internal:
    name: translation-tool-network
    driver: bridge
