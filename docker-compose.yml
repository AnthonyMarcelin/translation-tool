services:
  front:
    build:
      context: ./front
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - back
    restart: unless-stopped

  back:
    build: ./back
    ports:
      - "3001:3001"
    restart: unless-stopped
    volumes:
      - translation_db:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required — set it in a .env file}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-Translation Tool <no-reply@translation.local>}

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "5001:5000"
    volumes:
      - libretranslate_models:/data
      - libretranslate_cache:/app/cache
    restart: unless-stopped
    environment:
      - LT_LOAD_ONLY=en,fr,es,de,it,nl,pt,ja
      - LT_UPDATE_MODELS=true

volumes:
  translation_db:
    external: true
    name: translation-tool_db

  libretranslate_models:
    driver: local
    name: translation-tool_models

  libretranslate_cache:
    driver: local
    name: translation-tool_cache
